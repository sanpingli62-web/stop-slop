<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>休斯顿高真16位进制号码生成引擎</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050b14;
        }
        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }
        .custom-glow {
            box-shadow: 0 0 30px -5px rgba(59, 130, 246, 0.15);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.4);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- 顶部状态提示 Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 translate-y-[-100px] opacity-0 transition-all duration-400 ease-out flex items-center gap-2 bg-slate-800 border border-emerald-500/50 text-emerald-400 px-6 py-3 rounded-2xl shadow-2xl z-50">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-text" class="text-sm font-bold tracking-wide">操作成功</span>
    </div>

    <!-- 主体容器 -->
    <div class="container mx-auto px-4 py-6 max-w-6xl flex-grow">
        
        <!-- 头部标题 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-blue-900/30 border border-blue-500/30 rounded-full text-blue-400 text-xs font-semibold mb-4">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                休斯顿专属区号 (713, 214, 469, 972, 945)
            </div>
            <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight text-white mb-3">
                16位进制<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">高保真号码</span>生成系统
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-xs md:text-sm">
                双轨验证：在生成 16 进制数据的同时，逆向展示对应的真实格式，确保数据逼真且绝不重复。
            </p>
        </div>

        <!-- 工作区网格 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- 左侧：控制台 -->
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 md:p-6 custom-glow">
                    <h3 class="text-base font-bold mb-5 flex items-center gap-2 text-white border-b border-slate-800 pb-3">
                        <i data-lucide="cpu" class="w-5 h-5 text-indigo-400"></i> 生成器核心调校
                    </h3>

                    <div class="mb-6">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">产出数量 (个)</label>
                        <div class="relative">
                            <input type="number" id="quantity" value="10000" min="1" max="50000" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 font-bold tracking-wider text-lg transition-colors pl-10">
                            <i data-lucide="hash" class="w-5 h-5 absolute left-3 top-3.5 text-slate-500"></i>
                        </div>
                    </div>

                    <button id="generate-btn" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-blue-900/20 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
                        <i data-lucide="zap" class="w-5 h-5 fill-white"></i>
                        开始生成号码
                    </button>
                </div>

                <div id="stats-panel" class="bg-slate-900 border border-slate-800 rounded-2xl p-5 custom-glow hidden">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">
                        区号数据源分布
                    </h3>
                    <div class="space-y-3" id="distribution-bars"></div>
                </div>
            </div>

            <!-- 右侧：高真数据监视器 -->
            <div class="lg:col-span-8 bg-slate-900 border border-slate-800 rounded-2xl p-4 md:p-6 flex flex-col h-[600px] md:h-[650px] custom-glow relative overflow-hidden">
                
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 pb-4 border-b border-slate-800 mb-2 relative z-10">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-500/10 p-2 rounded-lg border border-blue-500/20">
                            <i data-lucide="radar" class="w-4 h-4 md:w-5 md:h-5 text-blue-400"></i>
                        </div>
                        <div>
                            <h3 class="text-sm md:text-base font-bold text-white">高保真输出矩阵</h3>
                            <div class="text-[10px] text-slate-500 font-mono mt-0.5">HEX // NANP</div>
                        </div>
                    </div>

                    <div id="action-group" class="hidden flex items-center gap-2 w-full sm:w-auto">
                        <button id="copy-btn" class="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-3 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-slate-300 text-xs font-semibold transition-colors">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i> 复制纯HEX代码
                        </button>
                        <button id="download-btn" class="flex-1 sm:flex-none flex justify-center items-center gap-1.5 px-3 py-2 bg-indigo-600/20 hover:bg-indigo-600/40 border border-indigo-500/50 rounded-lg text-indigo-300 text-xs font-semibold transition-colors">
                            <i data-lucide="download" class="w-3.5 h-3.5"></i> 下载 TXT
                        </button>
                    </div>
                </div>

                <div id="list-header" class="hidden grid grid-cols-12 gap-2 px-2 py-2 bg-slate-950/50 border border-slate-800 rounded-lg mb-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider relative z-10">
                    <div class="col-span-2 text-center md:text-left">序号</div>
                    <div class="col-span-5 text-blue-400"><i data-lucide="file-digit" class="w-3 h-3 inline-block mr-0.5"></i> 16进制源码</div>
                    <div class="col-span-5 text-emerald-400"><i data-lucide="phone" class="w-3 h-3 inline-block mr-0.5"></i> 真实号码</div>
                </div>

                <div id="output-container" class="flex-grow overflow-y-auto bg-slate-950/80 rounded-xl p-1 md:p-2 border border-slate-800/80 mono-font text-xs md:text-sm flex flex-col custom-scrollbar relative z-10">
                    <div class="m-auto text-center opacity-50 select-none">
                        <i data-lucide="fingerprint" class="w-12 h-12 md:w-16 md:h-16 text-slate-600 mx-auto mb-4"></i>
                        <p class="text-slate-400 text-xs md:text-sm">等待系统推演高保真数据...</p>
                    </div>
                </div>

                <div id="stats-bar" class="hidden flex justify-between items-center mt-3 pt-3 border-t border-slate-800/60 text-[10px] md:text-xs text-slate-500 relative z-10">
                    <div class="flex gap-3">
                        <span>耗时: <span id="stat-time" class="text-indigo-400 font-bold">0ms</span></span>
                        <span>剔除重复: <span id="stat-duplicates" class="text-pink-400 font-bold">0</span></span>
                    </div>
                    <div>
                        总计: <span id="stat-total" class="text-emerald-400 font-bold text-sm">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const generateBtn = document.getElementById('generate-btn');
        const quantityInput = document.getElementById('quantity');
        const outputContainer = document.getElementById('output-container');
        const actionGroup = document.getElementById('action-group');
        const listHeader = document.getElementById('list-header');
        const statsBar = document.getElementById('stats-bar');
        const statsPanel = document.getElementById('stats-panel');
        const distBarsContainer = document.getElementById('distribution-bars');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toast-text');

        let generatedData = [];
        const areaCodes = ['713', '214', '469', '972', '945'];

        function showToast(message) {
            toastText.textContent = message;
            toast.classList.remove('translate-y-[-100px]', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-[-100px]', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        function formatPhoneNumber(phoneStr) {
            const area = phoneStr.substring(0, 3);
            const mid = phoneStr.substring(3, 6);
            const last = phoneStr.substring(6, 10);
            return `(${area}) ${mid}-${last}`;
        }

        function runGeneration() {
            const count = parseInt(quantityInput.value, 10);
            if (isNaN(count) || count <= 0) {
                showToast("请输入合法的生成数量");
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 正在演算...`;
            lucide.createIcons();

            setTimeout(() => {
                const startTime = performance.now();
                const uniqueSet = new Set();
                const finalResults = []; 
                const distribution = { '713': 0, '214': 0, '469': 0, '972': 0, '945': 0 };
                let collisionCount = 0;

                while (uniqueSet.size < count) {
                    const areaCode = areaCodes[Math.floor(Math.random() * areaCodes.length)];
                    const localPart = Math.floor(2000000 + Math.random() * 8000000).toString();
                    
                    const phoneStr = areaCode + localPart;
                    const phoneDecimal = parseInt(phoneStr, 10);
                    
                    const hexStr = phoneDecimal.toString(16).toUpperCase().padStart(16, '0');
                    
                    if (!uniqueSet.has(hexStr)) {
                        uniqueSet.add(hexStr);
                        distribution[areaCode]++;
                        
                        finalResults.push({
                            hex: hexStr,
                            rawPhone: phoneStr,
                            formattedPhone: formatPhoneNumber(phoneStr)
                        });
                    } else {
                        collisionCount++;
                    }

                    if (collisionCount > count * 20) break;
                }

                const endTime = performance.now();
                generatedData = finalResults;

                updateUI(count, (endTime - startTime).toFixed(1), collisionCount, distribution);

            }, 50);
        }

        function updateUI(total, time, collisions, dist) {
            document.getElementById('stat-time').textContent = `${time}ms`;
            document.getElementById('stat-duplicates').textContent = collisions;
            document.getElementById('stat-total').textContent = total.toLocaleString();

            distBarsContainer.innerHTML = areaCodes.map(code => {
                const pct = ((dist[code] / total) * 100).toFixed(1);
                return `
                <div class="flex items-center justify-between text-[10px] md:text-xs font-mono mb-1">
                    <span class="text-slate-400">区号 ${code}</span>
                    <span class="text-blue-300">${dist[code].toLocaleString()} 个 (${pct}%)</span>
                </div>
                <div class="w-full bg-slate-950 rounded-full h-1.5 mb-3 border border-slate-800">
                    <div class="bg-gradient-to-r from-blue-500 to-indigo-500 h-1.5 rounded-full" style="width: ${pct}%"></div>
                </div>
                `;
            }).join('');

            let listHTML = '';
            for (let i = 0; i < generatedData.length; i++) {
                const item = generatedData[i];
                listHTML += `
                <div class="data-row grid grid-cols-12 gap-2 px-2 py-1.5 hover:bg-slate-800/60 border-b border-slate-800/30 transition-colors items-center rounded text-[10px] md:text-xs">
                    <div class="col-span-2 text-slate-500 text-center md:text-left">${String(i + 1).padStart(5, '0')}</div>
                    <div class="col-span-5 text-blue-300 font-bold hex-code tracking-wider break-all">${item.hex}</div>
                    <div class="col-span-5 flex items-center gap-1 text-emerald-500/80 whitespace-nowrap">
                        <span class="hidden md:inline"><i data-lucide="arrow-left-right" class="w-2.5 h-2.5 text-slate-600 mr-1"></i></span>
                        <span>${item.formattedPhone}</span>
                    </div>
                </div>`;
            }
            outputContainer.innerHTML = listHTML;
            
            setTimeout(() => { lucide.createIcons(); }, 100);

            listHeader.classList.remove('hidden');
            statsBar.classList.remove('hidden');
            statsPanel.classList.remove('hidden');
            actionGroup.classList.remove('hidden');

            generateBtn.disabled = false;
            generateBtn.innerHTML = `<i data-lucide="zap" class="w-5 h-5 fill-white"></i> 重新生成数据`;
            lucide.createIcons();

            showToast(`成功产出 ${total.toLocaleString()} 个号码`);
        }

        function getPureHexArray() {
            return generatedData.map(item => item.hex);
        }

        generateBtn.addEventListener('click', runGeneration);

        copyBtn.addEventListener('click', () => {
            if (generatedData.length === 0) return;
            const hexText = getPureHexArray().join('\n');
            
            const textarea = document.createElement('textarea');
            textarea.value = hexText;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast("✅ 全部 16 进制代码已复制，快去粘贴吧！");
            } catch (err) {
                showToast("复制失败，请尝试下载文件");
            }
            document.body.removeChild(textarea);
        });

        downloadBtn.addEventListener('click', () => {
            if (generatedData.length === 0) return;
            const hexText = getPureHexArray().join('\n');
            
            const blob = new Blob([hexText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Houston_16Hex_${generatedData.length}.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast("⬇️ TXT 文件已开始下载！");
        });
    </script>
</body>
</html>
